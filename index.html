<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ogelyan</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Libre+Baskerville&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Glacial Indifference';
    src: url('https://cdn.jsdelivr.net/gh/bBoxType/GlacialIndifference@1.1/GlacialIndifference-Regular.otf') format('opentype');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f4f1eb;
    font-family: 'Instrument Serif', Georgia, serif;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .main-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-top: -50px;
  }

  .main-unit img {
    display: block;
    width: min(480px, 90vw);
    height: min(260px, 48vw);
    object-fit: cover;
    object-position: top center;
    margin-bottom: 10px;
    margin-left: -25px;
  }

  h1 {
    font-size: clamp(52px, 8vw, 80px);
    font-weight: 400;
    letter-spacing: clamp(-1px, -0.3vw, -2px);
    line-height: 0.92;
    margin-bottom: 16px;
  }
  h1 em { font-style: italic; opacity: 0.35; }

  .tagline {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: clamp(11px, 2vw, 14px);
    line-height: 1.5;
    letter-spacing: -0.1px;
    opacity: 0.45;
    margin-bottom: 16px;
    white-space: nowrap;
  }

  @media (max-width: 768px) {
    .tagline { white-space: normal; }
    .release-info { white-space: normal; text-align: center; }
    .main-unit { padding: 0 16px; }
  }

  .release-info {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: clamp(10px, 1.8vw, 12px);
    opacity: 0.4;
    margin-bottom: 20px;
    letter-spacing: 0.1px;
  }

  .btn {
    background: #111;
    color: #f4f1eb;
    border: none;
    padding: clamp(10px, 2vw, 14px) clamp(20px, 4vw, 32px);
    font-family: 'Glacial Indifference', sans-serif;
    font-size: clamp(11px, 1.8vw, 13px);
    letter-spacing: 0.3px;
    cursor: pointer;
    border-radius: 3px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.75; }

  .email-form {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
  }
  .email-form input {
    background: white;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 3px;
    padding: 13px 18px;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 14px;
    color: #111;
    width: min(280px, 80vw);
    outline: none;
    font-style: italic;
    text-align: center;
  }
  .email-form input:focus { border-color: rgba(0,0,0,0.3); }
  .email-form input::placeholder { opacity: 0.3; }
  .thanks {
    display: none;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-style: normal;
    opacity: 0.4;
    font-size: 14px;
  }
</style>
</head>

  <h1>A small<br>strange<br><em>friend.</em></h1>
  <p class="tagline">Lives quietly in the corner of your screen, in its own world,<br>piping up now and then with something surprisingly useful!</p>
  <p class="release-info" style="margin-top:-3px;">1/3 Batch of Collectible Collection #1 releasing soon<br>$24.99 per download</p>
  <button class="btn" id="registerBtn" onclick="showForm()">Register interest</button>
  <div class="email-form" id="emailForm">
    <input type="email" id="emailInput" placeholder="Your email"/>
    <button class="btn" onclick="submitEmail()">Notify me when it's ready</button>
  </div>
  <p class="thanks" id="thanks">Watch your inbox</p>
</div>


<script>
  function showForm() {
    document.getElementById('registerBtn').style.display = 'none';
    document.getElementById('emailForm').style.display = 'flex';
    setTimeout(() => document.getElementById('emailInput').focus(), 50);
  }
  function submitEmail() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email || !email.includes('@')) { document.getElementById('emailInput').focus(); return; }

    // Submit to Mailchimp via JSONP (works cross-origin)
    const script = document.createElement('script');
    const url = 'https://gmail.us2.list-manage.com/subscribe/post-json?u=046c72aec5c1e3f5f3a61385c&id=6b6cd16344&f_id=00b9c2e1f0'
      + '&EMAIL=' + encodeURIComponent(email)
      + '&b_046c72aec5c1e3f5f3a61385c_6b6cd16344='
      + '&c=mcCallback';
    window.mcCallback = function(data) {
      document.body.removeChild(script);
    };
    script.src = url;
    document.body.appendChild(script);

    // Also save locally
    const list = JSON.parse(localStorage.getItem('ogelyan_emails') || '[]');
    if (!list.includes(email)) { list.push(email); localStorage.setItem('ogelyan_emails', JSON.stringify(list)); }

    document.getElementById('emailForm').style.display = 'none';
    document.getElementById('thanks').style.display = 'block';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') submitEmail(); });
</script>
</body>
